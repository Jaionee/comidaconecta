<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Left leaf gradient (commerce) -->
    <linearGradient id="leftLeaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <!-- Right leaf gradient (ONG) -->
    <linearGradient id="rightLeaf" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ee7b7;stop-opacity:1" />
    </linearGradient>
    <!-- Dot glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#eab308;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a16207;stop-opacity:0" />
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- === LEFT LEAF (Commerce) === -->
  <!-- Left half of the heart shape, styled as a leaf -->
  <path d="M256 60 
           C 160 60, 60 140, 60 256 
           C 60 340, 120 410, 200 448 
           C 230 463, 250 465, 256 460
           C 256 380, 256 220, 256 60 Z" 
        fill="url(#leftLeaf)" filter="url(#shadow)"/>

  <!-- Left leaf vein -->
  <path d="M256 80 
           C 230 140, 190 200, 150 260 
           C 130 290, 110 330, 100 380" 
        stroke="#065f46" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Left leaf secondary veins -->
  <path d="M220 160 C 200 150, 180 145, 160 150" stroke="#065f46" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M190 230 C 170 220, 150 215, 130 220" stroke="#065f46" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M160 300 C 140 290, 120 285, 105 290" stroke="#065f46" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- === RIGHT LEAF (ONG) === -->
  <!-- Right half of the heart shape, styled as a leaf -->
  <path d="M256 60 
           C 352 60, 452 140, 452 256 
           C 452 340, 392 410, 312 448 
           C 282 463, 262 465, 256 460
           C 256 380, 256 220, 256 60 Z" 
        fill="url(#rightLeaf)" filter="url(#shadow)"/>

  <!-- Right leaf vein -->
  <path d="M256 80 
           C 282 140, 322 200, 362 260 
           C 382 290, 402 330, 412 380" 
        stroke="#064e3b" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Right leaf secondary veins -->
  <path d="M292 160 C 312 150, 332 145, 352 150" stroke="#064e3b" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M322 230 C 342 220, 362 215, 382 220" stroke="#064e3b" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M352 300 C 372 290, 392 285, 407 290" stroke="#064e3b" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- === GOLDEN CONNECTION DOTS === -->
  <!-- Left dot with glow (Commerce) -->
  <circle cx="180" cy="390" r="22" fill="url(#dotGlow)" />
  <circle cx="180" cy="390" r="13" fill="#fef08a" />
  
  <!-- Right dot with glow (ONG) -->
  <circle cx="332" cy="390" r="22" fill="url(#dotGlow)" />
  <circle cx="332" cy="390" r="13" fill="#fef08a" />

  <!-- Connection arc between dots -->
  <path d="M193 390 C 220 372, 256 365, 256 390 C 256 415, 292 408, 319 390" 
        stroke="#fef08a" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Arrow tips on arc -->
  <polygon points="309,384 321,390 309,396" fill="#fef08a" opacity="0.7"/>
  <polygon points="203,384 191,390 203,396" fill="#fef08a" opacity="0.7"/>

  <!-- Small dot labels (optional - tiny text) -->
  <text x="180" y="430" text-anchor="middle" fill="#a1a1aa" font-size="18" font-family="sans-serif" opacity="0.8">Comercio</text>
  <text x="332" y="430" text-anchor="middle" fill="#a1a1aa" font-size="18" font-family="sans-serif" opacity="0.8">ONG</text>
</svg>
