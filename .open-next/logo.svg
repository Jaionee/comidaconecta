<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580">
  <!-- 
    ComidaConecta Logo
    Two abstract figures (green + orange) embracing a central food bowl
    Minimalist, flat, no shadows/gradients/3D
  -->

  <!-- === LEFT FIGURE (Green #2F8F2F - Commerce) === -->
  <!-- Head -->
  <circle cx="140" cy="150" r="22" fill="#2F8F2F"/>
  <!-- Arm reaching toward center -->
  <path d="M140 172 C 85 200, 70 280, 90 345 C 110 385, 165 395, 235 378"
        stroke="#2F8F2F" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- === RIGHT FIGURE (Orange #FF8800 - ONG) === -->
  <!-- Head -->
  <circle cx="360" cy="150" r="22" fill="#FF8800"/>
  <!-- Arm reaching toward center -->
  <path d="M360 172 C 415 200, 430 280, 410 345 C 390 385, 335 395, 265 378"
        stroke="#FF8800" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- === BOWL (Green #2F8F2F) === -->
  <!-- Bowl body - U-shape -->
  <path d="M195 280 L195 325 C195 370, 305 370, 305 325 L305 280"
        stroke="#2F8F2F" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bowl rim -->
  <path d="M188 280 L312 280"
        stroke="#2F8F2F" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- === FOOD INSIDE BOWL === -->

  <!-- 1. Bread (Orange #FF8800) - small rounded rect -->
  <rect x="214" y="295" width="40" height="28" rx="6" fill="#FF8800"/>
  <!-- Bread crust detail -->
  <line x1="222" y1="308" x2="246" y2="308" stroke="#E07000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 2. Fruit (Orange/Red circle with green leaf) -->
  <circle cx="268" cy="308" r="14" fill="#FF6600"/>
  <!-- Fruit leaf -->
  <path d="M268 294 C 272 288, 280 288, 278 296"
        fill="#2F8F2F"/>
  <!-- Fruit highlight -->
  <circle cx="263" cy="304" r="3" fill="#FFB366" opacity="0.6"/>

  <!-- 3. Leafy vegetable (Green) -->
  <!-- Stem -->
  <path d="M240 318 C 238 330, 242 340, 250 345"
        stroke="#2F8F2F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M240 316 C 226 312, 220 322, 230 330 C 224 338, 232 348, 242 340"
        fill="#2F8F2F" opacity="0.8"/>
  <path d="M242 318 C 248 308, 260 312, 255 325"
        fill="#2F8F2F" opacity="0.7"/>

  <!-- === TEXT "ComidaConecta" === -->
  <text x="250" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" letter-spacing="1">
    <tspan fill="#2F8F2F">Comida</tspan><tspan fill="#FF8800">Conecta</tspan>
  </text>
</svg>
